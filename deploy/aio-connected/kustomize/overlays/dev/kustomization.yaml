# =============================================================================
# Kustomize Overlay — Development
# =============================================================================
# Lower resource limits, single replica, debug logging.
# =============================================================================

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  # --- Inference server: lower resources, 1 replica, debug logging ----------
  - target:
      kind: Deployment
      name: inference-server
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: inference-server
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: inference-server
                resources:
                  requests:
                    cpu: 250m
                    memory: 512Mi
                  limits:
                    cpu: 500m
                    memory: 1Gi
                env:
                  - name: LOG_LEVEL
                    value: DEBUG

  # --- Sensor simulator: lower resources, 1 replica, debug logging ----------
  - target:
      kind: Deployment
      name: sensor-simulator
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: sensor-simulator
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: sensor-simulator
                resources:
                  requests:
                    cpu: 25m
                    memory: 32Mi
                  limits:
                    cpu: 100m
                    memory: 64Mi
                env:
                  - name: LOG_LEVEL
                    value: DEBUG

  # --- Mosquitto: lower resources -------------------------------------------
  - target:
      kind: Deployment
      name: mosquitto
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: mosquitto
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: mosquitto
                resources:
                  requests:
                    cpu: 25m
                    memory: 32Mi
                  limits:
                    cpu: 100m
                    memory: 64Mi
